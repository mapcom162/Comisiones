<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora de Comisiones</title>

    <link rel="stylesheet" href="ventas.css">

    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <label>Salario Base:</label>
        <input type="text" id="txtSueldoBase" onblur="validarCampo(this)">
        <span id="errorTxtSueldoBase" class="mensaje-error"></span>

        <label>Número de ventas:</label>
        <input type="text" id="txtVentas" onblur="validarCampo(this)">
        <span id="errorTxtVentas" class="mensaje-error"></span>

        <label>Precio del producto:</label>
        <input type="text" id="txtPrecio" onblur="validarCampo(this)">
        <span id="errorTxtPrecio" class="mensaje-error"></span>

        <button onclick="calcular()">Calcular Comisión</button>

        <h2>Resultados</h2>
        <p>Salario Base: <span id="spSueldoBase"></span></p>
        <p>Comisión: <span id="spComision"></span></p>
        <p>Total: <span id="spTotal"></span></p>
    </div>

    
</body>
</html>
